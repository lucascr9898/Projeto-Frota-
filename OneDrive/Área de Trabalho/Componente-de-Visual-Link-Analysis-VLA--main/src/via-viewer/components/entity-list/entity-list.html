<div class ="list-entity">
<input type="text" placeholder="Buscar entidade"[(ngModel)]="searchInput" />

<ul>
    @for (entity of finalList; track entity.id){
        <li
           [class.selected]="entity.id === selectedName?.id"
           (click)="onEntityClick(entity)">
           <span>{{entity.label}}</span>
           <span>{{entity.type}}</span>
        
        </li>
       }
</ul>
</div>
